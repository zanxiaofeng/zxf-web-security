server.port=8086

#To support execute multiple query in a single statement; ?allowMultiQueries=true
spring.datasource.url=jdbc:mysql://localhost:3308/sql-injection?allowMultiQueries=true
spring.datasource.username=davis
spring.datasource.password=test
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled: true
spring.flyway.baseline-on-migrate: true
spring.flyway.validate-on-migrate: true
spring.flyway.locations: classpath:db/migration


logging.level.org.springframework.web.cors=TRACE
logging.level.org.springframework.web.servlet.handler=TRACE

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.csrf=TRACE
logging.level.org.springframework.security.web.firewall=DEBUG